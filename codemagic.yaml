workflows:
  android-workflow:
    name: Texturas Android Build
    max_build_duration: 60
    environment:
      java: 17
      node: latest
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Prepare Environment
        script: |
          java -version
          ./gradlew --version
      - name: Assemble Debug APK
        script: |
          ./gradlew assembleDebug --stacktrace --info
    artifacts:
      - app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - phmello98-create@users.noreply.github.com
        notify:
          success: true
          failure: true
